name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run tests
        env:
          # Skip anything that needs real ONNX models or external services
          DOCVAULT_SKIP_MODELS: "1"
        run: pytest tests/ -v --cov=docvault --cov-report=xml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: [lint, test]
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # The real evaluation is the LLM-as-judge benchmark, which needs OPENAI_API_KEY +
  # a corpus + (optionally) Pinecone and costs money per run — not something to block
  # every push on. It runs only on manual dispatch, against the offline local backends,
  # and is non-blocking. Correctness on every push is covered by the `test` job.
  eval-gate:
    if: github.event_name == 'workflow_dispatch'
    needs: [build]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Run LLM-as-judge benchmark (offline backends)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DOCVAULT_DENSE_BACKEND: local
          DOCVAULT_EMBEDDING_BACKEND: openai
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::warning::OPENAI_API_KEY not set — skipping benchmark."; exit 0
          fi
          python benchmark/download_corpus.py --num-docs 15
          docvault ingest benchmark/corpus
          python benchmark/generate_dataset.py -n 40
          python benchmark/run_benchmark.py --judge-model gpt-4o
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-report
          path: benchmark/data/report.json
