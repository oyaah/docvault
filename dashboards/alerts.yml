groups:
  - name: docvault_alerts
    rules:
      # Hallucination rate exceeds 5% over 1 hour — windowed rate from counters,
      # not the deprecated last-value gauge.
      - alert: HighHallucinationRate
        expr: >
          rate(docvault_claims_stripped_total[1h])
          / clamp_min(rate(docvault_claims_total[1h]), 1e-9) > 0.05
        for: 1h
        labels:
          severity: critical
        annotations:
          summary: "Hallucination rate is {{ $value | humanizePercentage }}"
          description: >
            DocVault hallucination rate has exceeded 5% for the last hour.
            Claims are being stripped from responses at an elevated rate.
            Investigate retrieval quality and source document coverage.

      # End-to-end latency is LLM-generation dominated (measured p50≈6s, p95≈15s).
      # SLOs are set against that reality, not a sub-second fantasy. To alert on
      # the parts DocVault actually controls, gate on stage="retrieval" instead.
      - alert: HighQueryLatency
        expr: histogram_quantile(0.95, rate(docvault_query_latency_seconds_bucket{stage="total"}[5m])) > 18
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "P95 query latency is {{ $value }}s"
          description: >
            DocVault P95 end-to-end latency exceeds 18s. Check LLM provider
            latency, query-expansion overhead, and reranker load.

      # Retrieval-only latency (excludes the LLM) — this is the part we own.
      - alert: HighRetrievalLatency
        expr: histogram_quantile(0.95, rate(docvault_query_latency_seconds_bucket{stage="retrieval"}[5m])) > 1.0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "P95 retrieval latency is {{ $value }}s"
          description: >
            Retrieval (embed + dense + BM25 + rerank) P95 exceeds 1s — a real
            regression in the part of the pipeline we control.

      # Low retrieval confidence (too many "I don't know" responses)
      - alert: LowRetrievalConfidence
        expr: |
          histogram_quantile(0.50, rate(docvault_confidence_score_bucket[30m])) < 0.3
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Median retrieval confidence below 0.3"
          description: >
            More than half of queries are returning low-confidence results.
            This may indicate a coverage gap in the document corpus or
            embedding quality degradation.

      # Query error rate spike
      - alert: QueryErrorRate
        expr: |
          rate(docvault_query_errors_total[5m])
          / rate(docvault_query_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Query error rate exceeds 10%"
          description: >
            More than 10% of queries are failing. Check API logs
            and LLM provider status.

      # No queries received (pipeline might be down)
      - alert: NoQueriesReceived
        expr: increase(docvault_query_total[30m]) == 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "No queries received in 30 minutes"
          description: >
            DocVault has not received any queries in the last 30 minutes.
            Verify the service is healthy and reachable.

      # NLI verification scores dropping
      - alert: NLIScoreDegradation
        expr: |
          histogram_quantile(0.50, rate(docvault_nli_score_bucket[1h])) < 0.5
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Median NLI score dropped below 0.5"
          description: >
            The hallucination verification model is flagging a high
            proportion of generated claims as ungrounded. This could
            indicate a mismatch between retrieved context and LLM output.
